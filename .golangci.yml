version: "2"

linters:
  # Maximum: enable every linter, then disable a short justified list.
  default: all
  disable:
    # Requires an import allow-list; nothing to guard yet.
    - depguard
    # Requires every struct literal to set every field; fights the
    # many partially-initialized AST/config structs an interpreter has.
    - exhaustruct
    # Forbids fmt.Print*; a REPL prints to stdout by design.
    - forbidigo
    # Forbids returning interfaces; the evaluator's Code values are
    # interfaces by design.
    - ireturn
    # Forbids package-level variables; an interpreter's token,
    # keyword, and builtin tables are natural package-level state.
    - gochecknoglobals
    # Forbids short names such as i, e, ok; conflicts with idiomatic Go.
    - varnamelen
    # Whitespace-style opinions that fight gofumpt.
    - nlreturn
    - wsl
    - wsl_v5
    # Demands t.Parallel() everywhere; parallelism is not a goal.
    - paralleltest
    # Deprecated in favor of gomodguard_v2; both need a module
    # allow-list to be useful, and there is nothing to guard yet.
    - gomodguard
    # Forbids dynamic errors (fmt.Errorf); an interpreter's error
    # messages are inherently dynamic.
    - err113
    # Cyclomatic complexity counts every case of a flat dispatch
    # switch — the shape an interpreter is built from. gocognit
    # (cognitive complexity) remains, and punishes nesting, which
    # is what actually hurts. funlen would re-flag the same flat
    # dispatch functions on length.
    - cyclop
    - funlen
    - gocyclo
  settings:
    dupword:
      # "list list" appears in Morel types such as "int list list".
      ignore:
        - list
    goconst:
      ignore-tests: true
    exhaustive:
      # An enum switch with a default case is exhaustive; op-tag
      # switches routinely handle a few kinds and default the rest.
      default-signifies-exhaustive: true
    wrapcheck:
      # Span-carrying errors from this module's own packages are
      # user-facing output; they flow through unwrapped by design.
      ignore-package-globs:
        - github.com/hydromatic/morel-go/*
    govet:
      # vet at full strength, except fieldalignment: its
      # pointers-first ordering conflicts with embedded-base-first
      # struct style (embeddedstructfieldcheck), and the saving is
      # negligible for small AST nodes.
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    presets:
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    # gofumpt is a stricter superset of gofmt.
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hydromatic/morel-go

# End .golangci.yml
